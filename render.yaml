services:
  - type: web
    name: nexus-risk-api
    runtime: python
    region: singapore
    plan: free

    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py

    envVars:
      - key: PORT
        value: 8000
      - key: GEMINI_API_KEY
        sync: false          # Set this manually in Render dashboard
      - key: DATABASE_URL
        sync: false          # Set this manually in Render dashboard

    healthCheckPath: /api/health
