version: "3.9"

services:
  nexus-risk-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus_risk_api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      # Persist the SQLite database across container restarts
      - nexus_db:/app/backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  nexus_db:
